name: "Test"
on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'docs/**'
      - '.run/**'
      - '.vscode/**'
      - 'api/**'
      - 'features/**'
      - 'deployments/**'
      - 'scripts/**'
      - '*.md'

  pull_request:
    types: [ opened, synchronize ]
    branches:
      - master
      - main
      - staging
    paths-ignore:
      - 'docs/**'
      - '.run/**'
      - '.vscode/**'
      - 'api/**'
      - 'features/**'
      - 'deployments/**'
      - 'scripts/**'
      - '*.md'

  workflow_dispatch:

jobs:
  # Run unit tests
  unit:
    name: "Run unit tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

        # todo skip mocks coverage
      - name: Install dependencies and run tests
        run: |
          go mod download
          go test -v ./... -coverpkg=./... -short -coverprofile=unit_coverage.out

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: unit_coverage.out

  integration:
    name: "Run integration tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies and run tests
        run: |
          go mod download
          go test -v -run 'Integration$' ./... -coverpkg=./... -coverprofile=integration_coverage.out

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration_coverage.out

  code_coverage:
    name: "Code coverage report"
    if: github.event_name == 'pull_request' # Do not run when workflow is triggered by push to main branch
    runs-on: ubuntu-latest
    needs: [ unit, integration ]
    continue-on-error: true # not critical
    permissions:
      contents: read
      actions: read
      pull-requests: write # write permission needed to comment on PR
    steps:
      - uses: fgrosse/go-coverage-report@v1.1.1
        with:
          coverage-artifact-name: code-coverage
          coverage-file-name: unit_coverage.out